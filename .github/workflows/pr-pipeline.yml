name: CI Pipeline

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: [main]

permissions:
  contents: read
  packages: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Stage 1: Detect which modules changed ──────────────────────────────────
  detect:
    name: Detect changes
    uses: ./.github/workflows/detect-changes.yml
    with:
      base_ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}

  # ── Stage 2: Build affected modules in parallel ───────────────────────────
  build:
    name: Build
    needs: detect
    if: needs.detect.outputs.has_buildable_changes == 'true'
    strategy:
      fail-fast: false
      matrix:
        module: ${{ fromJson(needs.detect.outputs.affected_modules) }}
    uses: ./.github/workflows/build-module.yml
    with:
      module: ${{ matrix.module }}

  # ── Stage 3: Unit test affected modules in parallel ───────────────────────
  unit-test:
    name: Unit tests
    needs: [detect, build]
    if: needs.detect.outputs.has_buildable_changes == 'true' && needs.build.result == 'success'
    strategy:
      fail-fast: false
      matrix:
        module: ${{ fromJson(needs.detect.outputs.affected_modules) }}
    uses: ./.github/workflows/test-unit.yml
    with:
      module: ${{ matrix.module }}

  # ── Stage 4: Integration tests (conditional) ──────────────────────────────
  integration:
    name: Integration tests
    needs: [detect, unit-test]
    if: >-
      always() &&
      needs.detect.result == 'success' &&
      needs.detect.outputs.run_it_tests == 'true' &&
      (needs.unit-test.result == 'success' || needs.unit-test.result == 'skipped')
    uses: ./.github/workflows/test-integration.yml

  # ── Stage 5: Summary report ───────────────────────────────────────────────
  report:
    name: Pipeline summary
    needs: [detect, build, unit-test, integration]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Write step summary
        env:
          AFFECTED_MODULES:   ${{ needs.detect.outputs.affected_modules }}
          DETECTION_SOURCE:   ${{ needs.detect.outputs.detection_source }}
          RUN_IT:             ${{ needs.detect.outputs.run_it_tests }}
          BUILD_RESULT:       ${{ needs.build.result }}
          UNIT_TEST_RESULT:   ${{ needs.unit-test.result }}
          INTEGRATION_RESULT: ${{ needs.integration.result }}
        run: |
          {
            echo "## CI Pipeline Summary"
            echo ""
            echo "| | |"
            echo "|---|---|"
            echo "| **Detection** | \`$DETECTION_SOURCE\` |"
            echo "| **Affected modules** | \`$AFFECTED_MODULES\` |"
            echo "| **Build** | $BUILD_RESULT |"
            echo "| **Unit tests** | $UNIT_TEST_RESULT |"
            echo "| **Integration tests** | ${INTEGRATION_RESULT:-skipped (not triggered)} |"
          } >> "$GITHUB_STEP_SUMMARY"
