services:

  # ── Zookeeper ────────────────────────────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/2181'"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ── Kafka ─────────────────────────────────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.6.1
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,EXTERNAL://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,EXTERNAL://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:29092", "--list"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

  # ── Topic bootstrap ───────────────────────────────────────────────────────────
  kafka-setup:
    image: confluentinc/cp-kafka:7.6.1
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/bash"]
    command:
      - -c
      - |
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic declarations.created --partitions 1 --replication-factor 1 --config retention.ms=604800000 &&
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic validations.completed --partitions 1 --replication-factor 1 --config retention.ms=604800000 &&
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic risk.assessed --partitions 1 --replication-factor 1 --config retention.ms=604800000 &&
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic declarations.created.dlq --partitions 1 --replication-factor 1 --config retention.ms=604800000 &&
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic validations.completed.dlq --partitions 1 --replication-factor 1 --config retention.ms=604800000 &&
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic risk.assessed.dlq --partitions 1 --replication-factor 1 --config retention.ms=604800000 &&
        echo 'All topics created.'

  # ── PostgreSQL instances ──────────────────────────────────────────────────────
  postgres-declare:
    image: postgres:16
    command: ["postgres", "-c", "wal_level=logical"]
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: declare
      POSTGRES_USER: declare
      POSTGRES_PASSWORD: declare
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U declare -d declare"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-validate:
    image: postgres:16
    command: ["postgres", "-c", "wal_level=logical"]
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: validate
      POSTGRES_USER: validate
      POSTGRES_PASSWORD: validate
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U validate -d validate"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-risk:
    image: postgres:16
    command: ["postgres", "-c", "wal_level=logical"]
    ports:
      - "5434:5432"
    environment:
      POSTGRES_DB: risk
      POSTGRES_USER: risk
      POSTGRES_PASSWORD: risk
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U risk -d risk"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-audit:
    image: postgres:16
    ports:
      - "5435:5432"
    environment:
      POSTGRES_DB: audit
      POSTGRES_USER: audit
      POSTGRES_PASSWORD: audit
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U audit -d audit"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Debezium Connect ──────────────────────────────────────────────────────────
  debezium-connect:
    image: debezium/connect:2.6
    depends_on:
      kafka:
        condition: service_healthy
      postgres-declare:
        condition: service_healthy
      postgres-validate:
        condition: service_healthy
      postgres-risk:
        condition: service_healthy
    ports:
      - "8083:8083"
    environment:
      BOOTSTRAP_SERVERS: kafka:29092
      GROUP_ID: debezium-connect-cluster
      CONFIG_STORAGE_TOPIC: debezium.configs
      OFFSET_STORAGE_TOPIC: debezium.offsets
      STATUS_STORAGE_TOPIC: debezium.status
      CONFIG_STORAGE_REPLICATION_FACTOR: 1
      OFFSET_STORAGE_REPLICATION_FACTOR: 1
      STATUS_STORAGE_REPLICATION_FACTOR: 1
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8083/connectors"]
      interval: 10s
      timeout: 10s
      retries: 15

  # ── Application services ─────────────────────────────────────────────────────
  svc-declare:
    build:
      context: ../svc-declare
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      QUARKUS_PROFILE: prod
    depends_on:
      postgres-declare:
        condition: service_healthy
      kafka-setup:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/q/health/ready"]
      interval: 10s
      timeout: 5s
      retries: 10

  svc-validate:
    build:
      context: ..
      dockerfile: svc-validate/Dockerfile.jvm
    ports:
      - "8081:8081"
    environment:
      QUARKUS_PROFILE: prod
      # Override the declarations-created batch size (default 100, set in application.properties)
      # without a rebuild, e.g.: MP_MESSAGING_INCOMING_DECLARATIONS_CREATED_MAX_POLL_RECORDS: "50"
    volumes:
      - ../consumer-map.yml:/config/consumer-map.yml:ro
    depends_on:
      postgres-validate:
        condition: service_healthy
      kafka-setup:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8081/q/health/ready"]
      interval: 10s
      timeout: 5s
      retries: 10

  svc-risk:
    build:
      context: ..
      dockerfile: svc-risk/Dockerfile
    ports:
      - "8082:8082"
    environment:
      QUARKUS_PROFILE: prod
      # Override the validations-completed batch size (default 100, set in application.properties)
      # without a rebuild, e.g.: MP_MESSAGING_INCOMING_VALIDATIONS_COMPLETED_MAX_POLL_RECORDS: "50"
    volumes:
      - ../consumer-map.yml:/config/consumer-map.yml:ro
    depends_on:
      postgres-risk:
        condition: service_healthy
      kafka-setup:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8082/q/health/ready"]
      interval: 10s
      timeout: 5s
      retries: 10

  svc-audit:
    build:
      context: ..
      dockerfile: svc-audit/Dockerfile
    ports:
      - "8084:8084"
    environment:
      QUARKUS_PROFILE: prod
      # Override any of the 3 channel batch sizes (default 100, set in application.properties)
      # without a rebuild, e.g.: MP_MESSAGING_INCOMING_AUDIT_DECLARATIONS_MAX_POLL_RECORDS: "50"
    volumes:
      - ../consumer-map.yml:/config/consumer-map.yml:ro
    depends_on:
      postgres-audit:
        condition: service_healthy
      kafka-setup:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8084/q/health/ready"]
      interval: 10s
      timeout: 5s
      retries: 10

networks:
  default:
    name: neversoft-net
