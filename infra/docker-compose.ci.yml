# CI override: use JVM-mode Dockerfiles instead of native builds.
# Usage: docker compose -f docker-compose.yml -f docker-compose.ci.yml [command]
#
# Native image builds (declare-svc, audit-svc, risk-svc) take 15-20 minutes each.
# JVM builds take ~3-5 minutes and are sufficient for integration test validation.
services:
  declare-svc:
    build:
      dockerfile: Dockerfile.jvm

  audit-svc:
    build:
      dockerfile: Dockerfile.jvm

  risk-svc:
    build:
      dockerfile: Dockerfile.jvm
