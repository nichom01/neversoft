quarkus.application.name=svc-validate
quarkus.http.port=8081

# Datasource — dev/test uses DevServices (auto-provisioned PostgreSQL)
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=validate
quarkus.datasource.password=validate

quarkus.hibernate-orm.database.generation=none

quarkus.flyway.migrate-at-start=true
quarkus.flyway.locations=classpath:db/migration

# Production (Docker Compose)
%prod.quarkus.datasource.jdbc.url=jdbc:postgresql://postgres-validate:5432/validate
%prod.quarkus.datasource.username=validate
%prod.quarkus.datasource.password=validate

# Kafka
mp.messaging.incoming.declarations-created.connector=smallrye-kafka
mp.messaging.incoming.declarations-created.topic=declarations.created
mp.messaging.incoming.declarations-created.group.id=svc-validate
mp.messaging.incoming.declarations-created.value.deserializer=org.apache.kafka.common.serialization.StringDeserializer
mp.messaging.incoming.declarations-created.auto.offset.reset=earliest

%prod.kafka.bootstrap.servers=kafka:29092
%dev.kafka.bootstrap.servers=localhost:9092

# Redirect Kafka channel to in-memory connector in tests so no broker needed
%test.mp.messaging.incoming.declarations-created.connector=smallrye-in-memory

# Structured JSON logs in production; human-readable locally
quarkus.log.console.json=true
%dev.quarkus.log.console.json=false
%test.quarkus.log.console.json=false
