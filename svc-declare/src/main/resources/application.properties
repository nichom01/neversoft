quarkus.application.name=svc-declare
quarkus.http.port=8080

# Datasource — dev/test uses DevServices (auto-provisioned PostgreSQL via Testcontainers)
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=declare
quarkus.datasource.password=declare

quarkus.hibernate-orm.database.generation=none

quarkus.flyway.migrate-at-start=true
quarkus.flyway.locations=classpath:db/migration

# Production (Docker Compose)
%prod.quarkus.datasource.jdbc.url=jdbc:postgresql://postgres-declare:5432/declare
%prod.quarkus.datasource.username=declare
%prod.quarkus.datasource.password=declare

# Structured JSON logs in production; human-readable locally
quarkus.log.console.json=true
%dev.quarkus.log.console.json=false
%test.quarkus.log.console.json=false
