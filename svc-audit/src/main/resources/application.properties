quarkus.application.name=svc-audit
quarkus.http.port=8084

# Datasource — dev/test uses DevServices (auto-provisioned PostgreSQL)
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=audit
quarkus.datasource.password=audit

quarkus.hibernate-orm.database.generation=none

quarkus.flyway.migrate-at-start=true
quarkus.flyway.locations=classpath:db/migration

# Production (Docker Compose)
%prod.quarkus.datasource.jdbc.url=jdbc:postgresql://postgres-audit:5432/audit
%prod.quarkus.datasource.username=audit
%prod.quarkus.datasource.password=audit

# Consumer map
consumer-map.file=../consumer-map.yml
%prod.consumer-map.file=/config/consumer-map.yml

# Kafka
mp.messaging.incoming.audit-declarations.connector=smallrye-kafka
mp.messaging.incoming.audit-declarations.topic=declarations.created
mp.messaging.incoming.audit-declarations.group.id=svc-audit-declarations
mp.messaging.incoming.audit-declarations.value.deserializer=org.apache.kafka.common.serialization.StringDeserializer
mp.messaging.incoming.audit-declarations.auto.offset.reset=earliest
mp.messaging.incoming.audit-declarations.batch=true
mp.messaging.incoming.audit-declarations.max.poll.records=100
mp.messaging.incoming.audit-declarations.commit-strategy=latest

mp.messaging.incoming.audit-validations.connector=smallrye-kafka
mp.messaging.incoming.audit-validations.topic=validations.completed
mp.messaging.incoming.audit-validations.group.id=svc-audit-validations
mp.messaging.incoming.audit-validations.value.deserializer=org.apache.kafka.common.serialization.StringDeserializer
mp.messaging.incoming.audit-validations.auto.offset.reset=earliest
mp.messaging.incoming.audit-validations.batch=true
mp.messaging.incoming.audit-validations.max.poll.records=100
mp.messaging.incoming.audit-validations.commit-strategy=latest

mp.messaging.incoming.audit-risk.connector=smallrye-kafka
mp.messaging.incoming.audit-risk.topic=risk.assessed
mp.messaging.incoming.audit-risk.group.id=svc-audit-risk
mp.messaging.incoming.audit-risk.value.deserializer=org.apache.kafka.common.serialization.StringDeserializer
mp.messaging.incoming.audit-risk.auto.offset.reset=earliest
mp.messaging.incoming.audit-risk.batch=true
mp.messaging.incoming.audit-risk.max.poll.records=100
mp.messaging.incoming.audit-risk.commit-strategy=latest

# Dead-letter topics for records that fail processing within a batch
mp.messaging.outgoing.audit-declarations-dlq.connector=smallrye-kafka
mp.messaging.outgoing.audit-declarations-dlq.topic=declarations.created.dlq
mp.messaging.outgoing.audit-declarations-dlq.value.serializer=org.apache.kafka.common.serialization.StringSerializer

mp.messaging.outgoing.audit-validations-dlq.connector=smallrye-kafka
mp.messaging.outgoing.audit-validations-dlq.topic=validations.completed.dlq
mp.messaging.outgoing.audit-validations-dlq.value.serializer=org.apache.kafka.common.serialization.StringSerializer

mp.messaging.outgoing.audit-risk-dlq.connector=smallrye-kafka
mp.messaging.outgoing.audit-risk-dlq.topic=risk.assessed.dlq
mp.messaging.outgoing.audit-risk-dlq.value.serializer=org.apache.kafka.common.serialization.StringSerializer

%prod.kafka.bootstrap.servers=kafka:29092
%dev.kafka.bootstrap.servers=localhost:9092

# Redirect all Kafka channels to in-memory connector in tests
%test.mp.messaging.incoming.audit-declarations.connector=smallrye-in-memory
%test.mp.messaging.incoming.audit-validations.connector=smallrye-in-memory
%test.mp.messaging.incoming.audit-risk.connector=smallrye-in-memory
%test.mp.messaging.outgoing.audit-declarations-dlq.connector=smallrye-in-memory
%test.mp.messaging.outgoing.audit-validations-dlq.connector=smallrye-in-memory
%test.mp.messaging.outgoing.audit-risk-dlq.connector=smallrye-in-memory

# Structured JSON logs in production; human-readable locally
quarkus.log.console.json=true
%dev.quarkus.log.console.json=false
%test.quarkus.log.console.json=false
