quarkus.application.name=svc-risk
quarkus.http.port=8082

# Datasource — dev/test uses DevServices (auto-provisioned PostgreSQL)
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=risk
quarkus.datasource.password=risk

quarkus.hibernate-orm.database.generation=none

quarkus.flyway.migrate-at-start=true
quarkus.flyway.locations=classpath:db/migration

# Production (Docker Compose)
%prod.quarkus.datasource.jdbc.url=jdbc:postgresql://postgres-risk:5432/risk
%prod.quarkus.datasource.username=risk
%prod.quarkus.datasource.password=risk

# Consumer map
consumer-map.file=../consumer-map.yml
%prod.consumer-map.file=/config/consumer-map.yml

# Kafka
mp.messaging.incoming.validations-completed.connector=smallrye-kafka
mp.messaging.incoming.validations-completed.topic=validations.completed
mp.messaging.incoming.validations-completed.group.id=svc-risk
mp.messaging.incoming.validations-completed.value.deserializer=org.apache.kafka.common.serialization.StringDeserializer
mp.messaging.incoming.validations-completed.auto.offset.reset=earliest
mp.messaging.incoming.validations-completed.batch=true
mp.messaging.incoming.validations-completed.max.poll.records=100
mp.messaging.incoming.validations-completed.commit-strategy=latest

# Dead-letter topic for records that fail processing within a batch
mp.messaging.outgoing.validations-completed-dlq.connector=smallrye-kafka
mp.messaging.outgoing.validations-completed-dlq.topic=validations.completed.dlq
mp.messaging.outgoing.validations-completed-dlq.value.serializer=org.apache.kafka.common.serialization.StringSerializer

%prod.kafka.bootstrap.servers=kafka:29092
%dev.kafka.bootstrap.servers=localhost:9092

# Redirect Kafka channels to in-memory connector in tests so no broker needed
%test.mp.messaging.incoming.validations-completed.connector=smallrye-in-memory
%test.mp.messaging.outgoing.validations-completed-dlq.connector=smallrye-in-memory

# Structured JSON logs in production; human-readable locally
quarkus.log.console.json=true
%dev.quarkus.log.console.json=false
%test.quarkus.log.console.json=false
